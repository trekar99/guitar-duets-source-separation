run:
  name: train_guitarrecordings_time_freq
dataset:
  manifest: data/manifests/guitarrecordings_synth.json
  train_split: train
  valid_split: valid
  test_split: test
  normalize: true
model:
  name: htdemucs
  kwargs:
    segment: 4
    time_conditioning: true
    freq_conditioning: true
    sources:
      - guitar1
      - guitar2
audio:
  segment_seconds: 4
